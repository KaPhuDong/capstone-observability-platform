# kube-prometheus-stack Helm values
# Prometheus + Grafana + Alertmanager

# ============================================================
# Prometheus
# ============================================================
prometheus:
  enabled: true

  prometheusSpec:
    # Giữ data 30 ngày
    retention: 30d
    retentionSize: "10GB"

    # Scrape interval
    scrapeInterval: "30s"
    evaluationInterval: "30s"

    # Bật remote write receiver (để nhận metrics từ OTel Collector)
    enableRemoteWriteReceiver: true

    # Tự động scrape tất cả ServiceMonitor trong mọi namespace
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    podMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}

    # Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

    # Resources
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 2Gi
        cpu: 1000m

    # Thêm scrape config cho OTel Demo services
    additionalScrapeConfigs:
      - job_name: otel-demo
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [otel-demo]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

# ============================================================
# Grafana
# ============================================================
grafana:
  enabled: true

  adminPassword: "admin123"  # Đổi khi production

  replicas: 1

  service:
    type: ClusterIP

  # Ingress (enable sau)
  ingress:
    enabled: false

  # Persistence
  persistence:
    enabled: true
    storageClassName: gp3
    size: 5Gi

  # Resources
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

  # Datasources tự động provisioning
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000

    - name: Tempo
      type: tempo
      url: http://tempo.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        httpMethod: GET
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true
        traceQuery:
          timeShiftEnabled: true
          spanStartTimeShift: "1h"
          spanEndTimeShift: "-1h"
        lokiSearch:
          datasourceUid: loki

  # Dashboard provisioning
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  # Import dashboard từ Grafana.com
  dashboards:
    default:
      # OTel Demo dashboard
      otel-demo:
        gnetId: 19419  # OpenTelemetry Demo dashboard
        revision: 1
        datasource: Prometheus
      # Kubernetes cluster overview
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      # Kubernetes pods
      kubernetes-pods:
        gnetId: 6336
        revision: 1
        datasource: Prometheus
      # Loki logs
      loki-logs:
        gnetId: 15141
        revision: 1
        datasource: Loki

# ============================================================
# Alertmanager
# ============================================================
alertmanager:
  enabled: true

  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

# ============================================================
# Node Exporter & Kube State Metrics
# ============================================================
nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

# ============================================================
# Default alert rules
# ============================================================
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false  # Managed EKS không expose etcd
    configReloaders: true
    general: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: false  # Managed EKS
    kubelet: true
    kubeProxy: false  # Managed EKS
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: false  # Managed EKS
    kubeSchedulerRecording: false  # Managed EKS
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
