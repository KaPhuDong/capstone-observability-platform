---
# ArgoCD Application: Prometheus Stack (Prometheus + Grafana + Alertmanager)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: capstone-observability
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "61.3.2"
    helm:
      releaseName: kube-prometheus-stack
      valueFiles:
        - $values/kubernetes/monitoring/prometheus/values.yaml

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "61.3.2"
      helm:
        releaseName: kube-prometheus-stack
        valueFiles:
          - $values/kubernetes/monitoring/prometheus/values.yaml
    - repoURL: https://github.com/KaPhuDong/capstone-observability-platform
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

